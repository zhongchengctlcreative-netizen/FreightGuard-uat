    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
      
      :root {
        /* Default Theme (Indigo) Values */
        --color-primary-50: #eef2ff;
        --color-primary-100: #e0e7ff;
        --color-primary-200: #c7d2fe;
        --color-primary-300: #a5b4fc;
        --color-primary-400: #818cf8;
        --color-primary-500: #6366f1;
        --color-primary-600: #4f46e5;
        --color-primary-700: #4338ca;
        --color-primary-800: #3730a3;
        --color-primary-900: #312e81;
        --color-primary-950: #1e1b4b;
      }

      body {
        font-family: 'Inter', sans-serif;
        background-color: #f1f5f9;
      }
      .custom-scrollbar::-webkit-scrollbar {
        height: 6px;
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: #f1f5f9;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 3px;
      }
      /* Map container fix */
      .leaflet-container {
        z-index: 0; 
      }

      /* Animations */
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
      
      @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
      .animate-fade-in-up { animation: fadeInUp 0.5s ease-out forwards; }

      @keyframes cardFlyIn { 
        0% { opacity: 0; transform: translateY(40px) scale(0.98); } 
        100% { opacity: 1; transform: translateY(0) scale(1); } 
      }
      .animate-card-fly-in { animation: cardFlyIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) both; }

      .delay-100 { animation-delay: 100ms; }
      .delay-200 { animation-delay: 200ms; }
      .delay-300 { animation-delay: 300ms; }

      /* --- PDF GENERATION STYLES --- */
      
      /* When generating PDF, hide non-essential UI elements */
      body.generating-pdf .pdf-hidden {
        display: none !important;
      }
      
      /* Force display of elements meant for PDF only */
      body.generating-pdf .pdf-visible {
        display: block !important;
      }
      
      body.generating-pdf {
        background-color: white;
      }

      /* CRITICAL FIX FOR FADED PDF: Disable all animations and force full opacity */
      body.generating-pdf * {
        animation: none !important;
        transition: none !important;
        opacity: 1 !important;
      }
      
      /* Ensure full width during capture */
      body.generating-pdf #printable-report {
        width: 1000px !important; /* Fixed width for consistent PDF scale */
        margin: 0 auto;
        padding: 20px;
        background-color: white;
      }
      
      /* Expand grid to full width */
      body.generating-pdf .lg\:col-span-2 {
        grid-column: span 3 / span 3 !important;
        width: 100% !important;
      }

    </style>
